<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Volunteer Manager Rapid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: linear-gradient(135deg, #6b0018, #1a0005);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 { font-size: 22px; color: #6b0018; font-weight: 800; }
    .logo p { color: #888; font-size: 14px; margin-top: 4px; }
    label { font-size: 14px; font-weight: 600; color: #333; display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #ddd;
      border-radius: 10px; font-size: 15px; margin-bottom: 18px;
      outline: none; transition: border .2s;
    }
    input:focus { border-color: #6b0018; }
    button {
      width: 100%; padding: 14px; background: #6b0018; color: #fff;
      border: none; border-radius: 10px; font-size: 16px;
      font-weight: 700; cursor: pointer;
    }
    button:hover { background: #8e1231; }
    .alert {
      padding: 12px 14px; border-radius: 10px; margin-bottom: 16px;
      font-size: 14px; font-weight: 500;
    }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-danger  { background: #f8d7da; color: #721c24; }
    .alert-info    { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🔴⚪ Volunteer Manager</h1>
      <p>FC Rapid 1923</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="email@rapid.ro" required />
      <label for="parola">Parolă</label>
      <input type="password" id="parola" name="parola" placeholder="••••••••" required />
      <button type="submit">Intră în aplicație</button>
    </form>
  </div>
</body>
</html>
