<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Voluntariat Manager Rapid</title>

  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#6b0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rapid 1923">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

  <style>
    body {
      background: linear-gradient(135deg, #6b0018, #1a0005);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo img { height: 56px; margin-bottom: 10px; }
    .logo h1 { font-size: 22px; color: #6b0018; font-weight: 800; }
    .logo p { color: #888; font-size: 14px; margin-top: 4px; }
    label { font-size: 14px; font-weight: 600; color: #333; display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #ddd;
      border-radius: 10px; font-size: 15px; margin-bottom: 18px;
      outline: none; transition: border .2s;
    }
    input:focus { border-color: #6b0018; }
    button {
      width: 100%; padding: 14px; background: #6b0018; color: #fff;
      border: none; border-radius: 10px; font-size: 16px;
      font-weight: 700; cursor: pointer;
    }
    button:hover { background: #8e1231; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <img src="{{ url_for('static', filename='icons/logo-program.png') }}" alt="Logo Programul de Voluntariat">
      <h1>Voluntariat Manager</h1>
      <p>FC Rapid 1923</p>
      <div class="powered-by-login">
        <span>Powered by —</span>
        <img src="{{ url_for('static', filename='sponsors/imamed-logo.png') }}" alt="IMAMED">
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="email@rapid.ro" required />
      <label for="parola">Parolă</label>
      <input type="password" id="parola" name="parola" placeholder="••••••••" required />
      <button type="submit">Intră în aplicație</button>
    </form>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js')
        .then(() => console.log('PWA activ!'))
        .catch(err => console.log('SW error:', err));
    }
  </script>
</body>
</html>
