<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voluntar Nou — Rapid</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

  <style>
    .main { max-width:600px; }

    h2 {
      font-size:24px;
      margin-bottom:24px;
    }

    .form-group {
      margin-bottom:18px;
    }

    label {
      font-size:14px;
      font-weight:600;
      display:block;
      margin-bottom:6px;
    }

    input,
    select {
      width:100%;
      padding:12px 14px;
      border:1.5px solid #ddd;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    input:focus,
    select:focus {
      border-color:#6b0018;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark topbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='icons/logo-program.png') }}" alt="Logo Programul de Voluntariat" class="brand-logo">
      <span class="brand-block">
        Voluntariat Manager Rapid 1923
        <span class="powered-by">
          <span>Powered by —</span>
          <img src="{{ url_for('static', filename='sponsors/imamed-logo.png') }}" alt="IMAMED">
        </span>
      </span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Deschide meniul">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="{{ url_for('voluntari') }}">Voluntari</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('evenimente') }}">Evenimente</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('departamente_view') }}">Departamente</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Deconectare</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <h2>Adaugă voluntar nou</h2>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Prenume *</label>
        <input type="text" name="prenume" required placeholder="ex: Andrei"/>
      </div>

      <div class="form-group">
        <label>Nume *</label>
        <input type="text" name="nume" required placeholder="ex: Ionescu"/>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" required placeholder="andrei@rapid.ro"/>
      </div>

      <div class="form-group">
        <label>Telefon</label>
        <input type="text" name="telefon" placeholder="07xx xxx xxx"/>
      </div>

      <div class="form-group">
        <label>Departament</label>
        <select name="departament">
          <option value="">— Selectează departament —</option>
          {% for d in departamente %}
            <option value="{{ d.nume }}">{{ d.nume }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Rol</label>
        <select name="rol">
          <option value="voluntar">Voluntar</option>
          <option value="coordonator">Coordonator</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label>Parolă temporară *</label>
        <input type="text" name="parola" required placeholder="Parola inițială pentru cont"/>
      </div>

      <button type="submit" class="btn btn-primary">Salvează voluntarul</button>
      <a href="{{ url_for('voluntari') }}" class="btn btn-outline">Anulează</a>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
