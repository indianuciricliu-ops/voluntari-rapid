<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check-in — Rapid</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Inter,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    body.ok { background:linear-gradient(135deg,#1a4a1f,#28a745); }
    body.err { background:linear-gradient(135deg,#4a1a1a,#dc3545); }
    .card { background:#fff; border-radius:24px; padding:44px 36px; text-align:center; max-width:360px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .icon { font-size:64px; margin-bottom:16px; }
    h2 { font-size:22px; font-weight:800; margin-bottom:10px; }
    h2.ok { color:#155724; }
    h2.err { color:#721c24; }
    p { color:#666; font-size:15px; margin-bottom:6px; }
    .name { font-size:20px; font-weight:800; color:#1f1720; margin:12px 0 4px; }
    .event { font-size:14px; color:#888; }
    .time { font-size:13px; color:#aaa; margin-top:16px; }
  </style>
</head>
<body class="{{ 'ok' if ok else 'err' }}">
  <div class="card">
    <div class="icon">{{ '✅' if ok else '⚠️' }}</div>
    <h2 class="{{ 'ok' if ok else 'err' }}">{{ 'Check-in reușit!' if ok else 'Atenție' }}</h2>
    <div class="name">{{ v.prenume }} {{ v.nume }}</div>
    <p class="event">{{ mesaj }}</p>
    {% if ok and eveniment %}
    <p class="event">📆 {{ eveniment.data.strftime('%d %B %Y, %H:%M') }}</p>
    {% endif %}
  </div>
</body>
</html>
