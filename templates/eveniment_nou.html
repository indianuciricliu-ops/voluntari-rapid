<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eveniment Nou — Rapid</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:Inter,sans-serif; background:#f7f6f2; color:#1f1720; }
    .topbar { background:linear-gradient(90deg,#6b0018,#8e1231); color:#fff; padding:16px 28px; display:flex; justify-content:space-between; align-items:center; }
    .topbar h1 { font-size:18px; font-weight:800; }
    .topbar a { color:#ffcdd2; font-size:14px; text-decoration:none; }
    .main { padding:28px; max-width:620px; }
    h2 { font-size:24px; margin-bottom:24px; }
    .card { background:#fff; border-radius:16px; padding:28px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
    .form-group { margin-bottom:18px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    label { font-size:14px; font-weight:600; display:block; margin-bottom:6px; }
    input, select, textarea { width:100%; padding:12px 14px; border:1.5px solid #ddd; border-radius:10px; font-size:15px; outline:none; font-family:inherit; }
    input:focus, select:focus, textarea:focus { border-color:#6b0018; }
    textarea { resize:vertical; min-height:80px; }
    .btn { padding:12px 24px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; border:none; text-decoration:none; display:inline-block; }
    .btn-primary { background:#6b0018; color:#fff; }
    .btn-outline { background:transparent; border:1.5px solid #ddd; color:#333; margin-left:10px; }
  </style>
</head>
<body>
<div class="topbar">
  <h1>🔴⚪ Voluntariat Manager Rapid 1923</h1>
  <a href="{{ url_for('evenimente') }}">← Înapoi la evenimente</a>
</div>
<div class="main">
  <h2>Eveniment nou</h2>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Titlu eveniment *</label>
        <input type="text" name="titlu" required placeholder="ex: Rapid vs FCSB"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Adversar</label>
          <input type="text" name="adversar" placeholder="ex: FCSB"/>
        </div>
        <div class="form-group">
          <label>Tip eveniment</label>
          <select name="tip">
            <option value="liga1">Liga 1</option>
            <option value="cupa">Cupă</option>
            <option value="amical">Amical</option>
            <option value="sedinta">Ședință</option>
            <option value="alta">Altul</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Data și ora meciului *</label>
          <input type="datetime-local" name="data" required/>
        </div>
        <div class="form-group">
          <label>Ora convocare voluntari</label>
          <input type="datetime-local" name="ora_convocare"/>
        </div>
      </div>
      <div class="form-group">
        <label>Locație</label>
        <input type="text" name="locatie" placeholder="ex: Stadion Giulești"/>
      </div>
      <div class="form-group">
        <label>Descriere / note</label>
        <textarea name="descriere" placeholder="Informații suplimentare pentru voluntari..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Salvează evenimentul</button>
      <a href="{{ url_for('evenimente') }}" class="btn btn-outline">Anulează</a>
    </form>
  </div>
</div>
</body>
</html>
