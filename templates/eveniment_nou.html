<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eveniment Nou — Rapid</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

  <style>
    .main { max-width:620px; }
    h2 { font-size:24px; margin-bottom:24px; }
    .form-group { margin-bottom:18px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    label { font-size:14px; font-weight:600; display:block; margin-bottom:6px; }
    input, select, textarea {
      width:100%;
      padding:12px 14px;
      border:1.5px solid #ddd;
      border-radius:10px;
      font-size:15px;
      outline:none;
      font-family:inherit;
    }
    input:focus, select:focus, textarea:focus { border-color:#6b0018; }
    textarea { resize:vertical; min-height:80px; }

    @media(max-width:768px) {
      .form-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark topbar">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='icons/logo-program.png') }}" alt="Logo Programul de Voluntariat" class="brand-logo">
      <span class="brand-block">
        Voluntariat Manager Rapid 1923
        <span class="powered-by">
          <span>Powered by —</span>
          <img src="{{ url_for('static', filename='sponsors/imamed-logo.png') }}" alt="IMAMED">
        </span>
      </span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Deschide meniul">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('evenimente') }}">Evenimente</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Deconectare</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <h2>Eveniment nou</h2>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Titlu eveniment *</label>
        <input type="text" name="titlu" required placeholder="ex: Rapid vs FCSB"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Adversar</label>
          <input type="text" name="adversar" placeholder="ex: FCSB"/>
        </div>
        <div class="form-group">
          <label>Tip eveniment</label>
          <select name="tip">
            <option value="liga1">Liga 1</option>
            <option value="cupa">Cupă</option>
            <option value="amical">Amical</option>
            <option value="sedinta">Ședință</option>
            <option value="alta">Altul</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Data și ora meciului *</label>
          <input type="datetime-local" name="data" required/>
        </div>
        <div class="form-group">
          <label>Ora convocare voluntari</label>
          <input type="datetime-local" name="ora_convocare"/>
        </div>
      </div>

      <div class="form-group">
        <label>Locație</label>
        <input type="text" name="locatie" placeholder="ex: Stadion Giulești"/>
      </div>

      <div class="form-group">
        <label>Descriere / note</label>
        <textarea name="descriere" placeholder="Informații suplimentare pentru voluntari..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Salvează evenimentul</button>
      <a href="{{ url_for('evenimente') }}" class="btn btn-outline">Anulează</a>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
